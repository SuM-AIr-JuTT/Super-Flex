<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <script src="popup.js" type="module"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: linear-gradient(180deg, #0b0d12 0%, #121722 100%);
      --surface: rgba(22, 26, 36, 0.94);
      --surface-soft: rgba(16, 19, 27, 0.86);
      --surface-2: rgba(28, 33, 45, 0.96);
      --text: #f4f7fb;
      --muted: #9ba8bb;
      --label: #b6c0d1;
      --border: rgba(255,255,255,0.08);
      --accent: #3ee7c0;
      --accent-2: #5a8cff;
      --accent-soft: rgba(62,231,192,0.14);
      --shadow: 0 18px 36px rgba(0,0,0,0.42);
      --header: linear-gradient(135deg, rgba(90,140,255,0.18), rgba(62,231,192,0.12));
      --button-bg: rgba(255,255,255,0.03);
      --button-shadow: 0 10px 24px rgba(0,0,0,0.22);
      --button-radius: 18px;
      --panel-radius: 22px;
      --glow: 0 0 0 rgba(0,0,0,0);
    }

    html, body { width: 292px; }

    body {
      position: relative;
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      overflow: hidden;
      border-radius: 22px;
      border: 1px solid var(--border);
      box-shadow: 0 28px 64px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    body::before {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at top right, rgba(255,255,255,0.05), transparent 24%),
        radial-gradient(circle at bottom left, var(--accent-soft), transparent 28%);
      mix-blend-mode: screen;
      opacity: .8;
    }

    .hdr {
      position: relative;
      z-index: 1;
      padding: 16px 16px 14px;
      background: var(--header);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
      backdrop-filter: blur(18px);
    }

    .hdr-badge {
      width: 32px; height: 32px;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; letter-spacing: .2px;
      color: white;
      background: linear-gradient(135deg, var(--accent-2), var(--accent));
      box-shadow: 0 10px 24px rgba(0,0,0,0.24), 0 0 18px rgba(90,140,255,0.22);
      flex-shrink: 0;
    }

    .hdr-title {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.2px;
      color: var(--text);
    }

    .hdr-ver {
      margin-left: auto;
      font-size: 10px;
      font-weight: 700;
      color: var(--accent);
      border: 1px solid color-mix(in srgb, var(--accent) 38%, transparent);
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      padding: 4px 8px;
      border-radius: 999px;
    }

    .body {
      position: relative;
      z-index: 1;
      padding: 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .section-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--panel-radius);
      padding: 10px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }

    .section-card.compact { padding-bottom: 12px; }

    .lbl {
      margin-bottom: 8px;
      padding: 0 4px;
      color: var(--label);
      font-size: 10px;
      font-weight: 800;
      letter-spacing: 1.45px;
      text-transform: uppercase;
    }

    .row {
      display: flex;
      gap: 8px;
    }

    .btn,
    .sf-sel,
    .fb-lbl {
      border-radius: var(--button-radius);
      border: 1px solid var(--border);
      box-shadow: var(--button-shadow), var(--glow);
    }

    .btn {
      flex: 1;
      min-height: 42px;
      padding: 10px 12px;
      background: var(--button-bg);
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 12px;
      font-weight: 700;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
      transition: transform .16s ease, box-shadow .16s ease, border-color .16s ease, background .16s ease;
    }

    .btn:hover,
    .sf-sel:hover,
    .fb-lbl:hover {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--accent) 44%, var(--border));
      box-shadow: 0 14px 30px rgba(0,0,0,0.28), 0 0 0 1px color-mix(in srgb, var(--accent) 12%, transparent);
    }

    .btn:active { transform: translateY(0) scale(.985); }

    .btn.primary {
      background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 18%, rgba(255,255,255,0.04)), color-mix(in srgb, var(--accent-2) 14%, rgba(255,255,255,0.03)));
      color: var(--accent);
    }

    .btn.alt {
      background: linear-gradient(135deg, color-mix(in srgb, var(--accent-2) 14%, rgba(255,255,255,0.03)), rgba(255,255,255,0.03));
      color: var(--text);
    }

    .btn.full { width: 100%; }

    .theme-controls {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    .sf-sel {
      width: 100%;
      min-height: 42px;
      padding: 0 12px;
      background: var(--button-bg);
      color: var(--text);
      outline: none;
      font-size: 12px;
      font-weight: 700;
      appearance: none;
      -webkit-appearance: none;
      cursor: pointer;
    }
    .sf-sel option { background: #131722; color: #eef2f7; }

    .fb-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 8px;
    }

    .fb-radio { display: none; }

    .fb-lbl {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 8px 6px;
      background: var(--button-bg);
      color: var(--muted);
      text-align: center;
      line-height: 1.2;
      font-size: 10px;
      font-weight: 700;
      cursor: pointer;
      transition: all .16s ease;
    }

    .fb-radio:checked + .fb-lbl {
      background: linear-gradient(135deg, color-mix(in srgb, var(--accent) 16%, rgba(255,255,255,0.04)), color-mix(in srgb, var(--accent-2) 10%, rgba(255,255,255,0.03)));
      color: var(--text);
      border-color: color-mix(in srgb, var(--accent) 44%, transparent);
      box-shadow: 0 12px 26px rgba(0,0,0,0.24), 0 0 0 1px color-mix(in srgb, var(--accent) 18%, transparent);
    }

    body.theme-01 {
      --bg: linear-gradient(180deg, #0f1724 0%, #14263b 100%);
      --surface: rgba(230, 241, 255, 0.12);
      --surface-soft: rgba(188, 220, 255, 0.12);
      --surface-2: rgba(255,255,255,0.12);
      --text: #edf6ff;
      --muted: #bfd0e6;
      --label: #d8e8fb;
      --border: rgba(255,255,255,0.16);
      --accent: #7ff7df;
      --accent-2: #7ab8ff;
      --accent-soft: rgba(127,247,223,0.18);
      --header: linear-gradient(135deg, rgba(130,191,255,0.22), rgba(127,247,223,0.16));
      --button-bg: rgba(255,255,255,0.08);
      --button-radius: 18px;
    }

    body.theme-02 {
      --bg: linear-gradient(180deg, #14091f 0%, #1b1031 100%);
      --surface: rgba(36, 22, 58, 0.96);
      --surface-soft: rgba(47, 28, 73, 0.96);
      --text: #f7efff;
      --muted: #cdbce7;
      --label: #dbccff;
      --border: rgba(196,157,255,0.18);
      --accent: #ef7fff;
      --accent-2: #7a8bff;
      --accent-soft: rgba(239,127,255,0.16);
      --header: linear-gradient(135deg, rgba(122,139,255,0.18), rgba(239,127,255,0.15));
      --button-bg: rgba(255,255,255,0.04);
    }

    body.theme-03 {
      --bg: linear-gradient(180deg, #07090d 0%, #0f1219 100%);
      --surface: rgba(15, 18, 24, 0.98);
      --surface-soft: rgba(10, 13, 18, 0.98);
      --surface-2: rgba(20, 24, 31, 0.98);
      --text: #f4f7fb;
      --muted: #96a3b5;
      --label: #b3bfd0;
      --border: rgba(255,255,255,0.07);
      --accent: #43e6c0;
      --accent-2: #5a8cff;
      --accent-soft: rgba(67,230,192,0.15);
      --header: linear-gradient(135deg, rgba(90,140,255,0.12), rgba(67,230,192,0.10));
      --button-bg: linear-gradient(180deg, rgba(255,255,255,0.03), rgba(255,255,255,0.015));
      --button-radius: 20px;
      --panel-radius: 24px;
      --glow: 0 0 18px rgba(67,230,192,0.05);
    }

    body.theme-04 {
      --bg: linear-gradient(180deg, #07131c 0%, #0d1d2c 100%);
      --surface: rgba(14, 34, 46, 0.96);
      --text: #eefbfd;
      --muted: #afcad2;
      --label: #c7edf4;
      --border: rgba(97,218,251,0.16);
      --accent: #40e0d0;
      --accent-2: #3ca9ff;
      --accent-soft: rgba(64,224,208,0.16);
      --header: linear-gradient(135deg, rgba(60,169,255,0.16), rgba(64,224,208,0.13));
    }

    body.theme-05 {
      --bg: linear-gradient(180deg, #07100b 0%, #0e1712 100%);
      --surface: rgba(11, 20, 15, 0.98);
      --text: #effff2;
      --muted: #abcab0;
      --label: #c2e9c8;
      --border: rgba(56,255,138,0.16);
      --accent: #39ff8d;
      --accent-2: #0cd56d;
      --accent-soft: rgba(57,255,141,0.12);
      --header: linear-gradient(135deg, rgba(57,255,141,0.14), rgba(12,213,109,0.09));
    }

    body.theme-06 {
      --bg: linear-gradient(180deg, #23101a 0%, #3b1623 100%);
      --surface: rgba(64, 26, 41, 0.96);
      --text: #fff5f7;
      --muted: #e4b9c2;
      --label: #ffd0d9;
      --border: rgba(255,158,184,0.18);
      --accent: #ff8da5;
      --accent-2: #ffb457;
      --accent-soft: rgba(255,141,165,0.16);
      --header: linear-gradient(135deg, rgba(255,180,87,0.16), rgba(255,141,165,0.14));
    }

    body.theme-07 {
      --bg: linear-gradient(180deg, #15120b 0%, #201b11 100%);
      --surface: rgba(27, 22, 12, 0.98);
      --text: #fff8eb;
      --muted: #d8c7a0;
      --label: #f0dcaf;
      --border: rgba(255,207,96,0.18);
      --accent: #ffc95d;
      --accent-2: #f5a623;
      --accent-soft: rgba(255,201,93,0.12);
      --header: linear-gradient(135deg, rgba(255,201,93,0.14), rgba(245,166,35,0.10));
    }

    body.theme-08 {
      --bg: linear-gradient(180deg, #120809 0%, #1f0d10 100%);
      --surface: rgba(28, 13, 16, 0.98);
      --text: #fff4f4;
      --muted: #d9a5a5;
      --label: #efc0c0;
      --border: rgba(255,72,84,0.18);
      --accent: #ff4754;
      --accent-2: #ff6b6b;
      --accent-soft: rgba(255,71,84,0.12);
      --header: linear-gradient(135deg, rgba(255,71,84,0.14), rgba(255,107,107,0.11));
    }

    body.theme-09 {
      --bg: linear-gradient(180deg, #edf4fc 0%, #d9e5f5 100%);
      --surface: rgba(255,255,255,0.76);
      --surface-soft: rgba(255,255,255,0.72);
      --surface-2: rgba(255,255,255,0.84);
      --text: #20314d;
      --muted: #6e7f97;
      --label: #5b7090;
      --border: rgba(83, 109, 151, 0.15);
      --accent: #16c5aa;
      --accent-2: #4f87ff;
      --accent-soft: rgba(22,197,170,0.16);
      --header: linear-gradient(135deg, rgba(79,135,255,0.14), rgba(22,197,170,0.12));
      --button-bg: rgba(255,255,255,0.82);
      --shadow: 0 18px 30px rgba(31, 60, 106, 0.12);
      --button-shadow: 0 10px 20px rgba(31, 60, 106, 0.10);
    }

    body.theme-10 {
      --bg: linear-gradient(180deg, #20253b 0%, #2a2f4d 100%);
      --surface: #313757;
      --surface-soft: #2b3150;
      --surface-2: #363d61;
      --text: #f1f5ff;
      --muted: #b9c0dd;
      --label: #cad0eb;
      --border: rgba(255,255,255,0.04);
      --accent: #63e1d4;
      --accent-2: #94a7ff;
      --accent-soft: rgba(99,225,212,0.12);
      --header: linear-gradient(135deg, rgba(148,167,255,0.16), rgba(99,225,212,0.14));
      --button-bg: linear-gradient(145deg, #353b5d, #2a304d);
      --shadow: 9px 9px 22px rgba(9,12,22,0.38), -7px -7px 18px rgba(74,84,129,0.12);
      --button-shadow: 7px 7px 18px rgba(9,12,22,0.35), -5px -5px 14px rgba(84,95,145,0.12);
      --button-radius: 20px;
      --panel-radius: 24px;
    }

    body.theme-11 {
      --bg: linear-gradient(180deg, #0f1020 0%, #181335 100%);
      --surface: rgba(30, 22, 58, 0.98);
      --text: #ffffff;
      --muted: #c6c2e9;
      --label: #ffe0ff;
      --border: rgba(174,114,255,0.20);
      --accent: #56f2d1;
      --accent-2: #a756ff;
      --accent-soft: rgba(167,86,255,0.15);
      --header: linear-gradient(135deg, rgba(167,86,255,0.18), rgba(86,242,209,0.12));
      --button-bg: linear-gradient(135deg, rgba(167,86,255,0.12), rgba(86,242,209,0.08));
    }
    body.theme-11 .hdr-title,
    body.theme-11 .btn,
    body.theme-11 .fb-lbl,
    body.theme-11 .sf-sel { text-shadow: 0 1px 8px rgba(167,86,255,0.18); }

    body.theme-12 {
      --bg: linear-gradient(180deg, #f4edd6 0%, #eadfca 100%);
      --surface: #f4e9d6;
      --surface-soft: #efe3ce;
      --surface-2: #f7efdf;
      --text: #262626;
      --muted: #575757;
      --label: #313131;
      --border: rgba(0,0,0,0.12);
      --accent: #ff4fa3;
      --accent-2: #00b8ff;
      --accent-soft: rgba(255,79,163,0.16);
      --header: linear-gradient(135deg, rgba(0,184,255,0.16), rgba(255,79,163,0.14));
      --button-bg: #f8efdd;
      --shadow: 4px 4px 0 #545454;
      --button-shadow: 4px 4px 0 #545454;
      --button-radius: 18px 18px 26px 18px;
      --panel-radius: 20px;
    }
    body.theme-12 .btn:hover,
    body.theme-12 .sf-sel:hover,
    body.theme-12 .fb-lbl:hover { transform: translate(-1px, -1px); }

    body.theme-13 {
      --bg: linear-gradient(180deg, #060814 0%, #0a1024 55%, #080a16 100%);
      --surface: rgba(12, 17, 36, 0.94);
      --surface-soft: rgba(14, 20, 42, 0.94);
      --surface-2: rgba(10, 15, 30, 0.98);
      --text: #ebf7ff;
      --muted: #8eb2d0;
      --label: #56e8ff;
      --border: rgba(86,232,255,0.18);
      --accent: #00f0ff;
      --accent-2: #ff47d1;
      --accent-soft: rgba(0,240,255,0.14);
      --header: linear-gradient(135deg, rgba(0,240,255,0.16), rgba(255,71,209,0.12));
      --button-bg: linear-gradient(135deg, rgba(0,240,255,0.08), rgba(255,71,209,0.06));
      --button-shadow: 0 0 16px rgba(0,240,255,0.10), 0 12px 24px rgba(0,0,0,0.30);
      --glow: 0 0 14px rgba(0,240,255,0.10);
    }
    body.theme-13::after {
      content: "";
      position: absolute;
      inset: 0;
      pointer-events: none;
      background: repeating-linear-gradient(180deg, rgba(255,255,255,0.02) 0 1px, transparent 1px 4px);
      mix-blend-mode: soft-light;
      opacity: .28;
    }

    body.theme-14 {
      --bg: radial-gradient(circle at top, #2a1145 0%, #100a2c 35%, #050813 100%);
      --surface: rgba(25, 17, 58, 0.92);
      --surface-soft: rgba(17, 12, 44, 0.92);
      --surface-2: rgba(29, 21, 70, 0.92);
      --text: #f6f2ff;
      --muted: #c7bde6;
      --label: #dbd0ff;
      --border: rgba(154,121,255,0.20);
      --accent: #3ce5ff;
      --accent-2: #ae67ff;
      --accent-soft: rgba(174,103,255,0.12);
      --header: linear-gradient(135deg, rgba(174,103,255,0.18), rgba(60,229,255,0.11));
      --button-bg: linear-gradient(135deg, rgba(174,103,255,0.08), rgba(60,229,255,0.05));
    }
  
    .hdr-badge {
      width: 34px;
      height: 34px;
      border-radius: 12px;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 0;
      background: transparent;
      box-shadow: 0 10px 24px rgba(0,0,0,0.26), 0 0 18px rgba(125,70,255,0.20);
      flex-shrink: 0;
    }
    .hdr-badge img {
      width: 100%;
      height: 100%;
      display: block;
      object-fit: cover;
      border-radius: inherit;
    }

  </style>
</head>
<body class="theme-03">
  <div class="hdr">
    <div class="hdr-badge"><img src="favicon.png" alt="Super Flex logo"></div>
    <span class="hdr-title">Super Flex</span>
    <span class="hdr-ver">v1.0</span>
  </div>

  <div class="body">
    <section class="section-card">
      <div class="lbl">Marks</div>
      <div class="row">
        <button class="btn primary" id="btn-fix-marks">Fix Grand Total</button>
        <button class="btn alt" id="btn-edit-marks">Edit Marks</button>
      </div>
    </section>

    <section class="section-card compact">
      <div class="lbl">GPA</div>
      <button class="btn primary full" id="btn-gpa">Turn On GPA Calculator</button>
    </section>

    <section class="section-card">
      <div class="lbl">Tools</div>
      <div class="row">
        <button class="btn alt" id="btn-fee">Fees</button>
        <button class="btn alt" id="btn-dark">Dark Mode</button>
      </div>
    </section>

    <section class="section-card compact">
      <div class="lbl">Theme</div>
      <div class="theme-controls">
        <select class="sf-sel" id="theme-select"></select>
        <button class="btn primary" id="btn-theme-next">Next Theme</button>
      </div>
    </section>

    <section class="section-card">
      <div class="lbl">Feedback</div>
      <div class="fb-grid">
        <input type="radio" class="fb-radio" name="fb" id="fb-sa" value="Strongly Agree">
        <label class="fb-lbl" for="fb-sa">Strongly Agree</label>
        <input type="radio" class="fb-radio" name="fb" id="fb-a" value="Agree">
        <label class="fb-lbl" for="fb-a">Agree</label>
        <input type="radio" class="fb-radio" name="fb" id="fb-u" value="Uncertain">
        <label class="fb-lbl" for="fb-u">Uncertain</label>
        <input type="radio" class="fb-radio" name="fb" id="fb-d" value="Dissatisfied">
        <label class="fb-lbl" for="fb-d">Dissatisfied</label>
        <input type="radio" class="fb-radio" name="fb" id="fb-sd" value="Strongly Disagree">
        <label class="fb-lbl" for="fb-sd">Strongly Disagree</label>
        <input type="radio" class="fb-radio" name="fb" id="fb-r" value="Randomize">
        <label class="fb-lbl" for="fb-r">Random</label>
      </div>
      <button class="btn primary full" id="btn-feedback">Apply Feedback</button>
    </section>
  </div>
  <div class="ftr">Credits: SuM-AIr-JuTT</div>
</body>
</html>
